<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 BookShelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%); }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); }
        tr:hover { background: #f8fafc; }
        .book-cover-small { width: 55px; height: 75px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto p-8">
        <!-- Header -->
        <header class="glass border border-slate-200 rounded-3xl px-8 py-6 mb-8 shadow-lg flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-4xl shadow">📚</div>
                <h1 class="text-4xl font-bold text-slate-800">BookShelf</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="exportCSV()" class="flex items-center gap-2 bg-white border border-slate-300 hover:border-slate-400 px-6 py-3 rounded-2xl">
                    ⬇️ Export CSV
                </button>
                <label class="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-2xl cursor-pointer hover:bg-indigo-700">
                    📤 Import CSV <input type="file" id="importFile" accept=".csv" class="hidden" onchange="importCSV()">
                </label>
            </div>
        </header>

        <div class="flex gap-3 mb-8 bg-white shadow rounded-3xl p-2 w-fit">
            <button onclick="switchTab(0)" id="tab0" class="tab-button active px-8 py-4 rounded-3xl font-semibold flex items-center gap-2">
                📋 All Books
            </button>
            <button onclick="switchTab(1)" id="tab1" class="tab-button px-8 py-4 rounded-3xl font-semibold flex items-center gap-2">
                ➕ Add Book
            </button>
        </div>

        <!-- All Books Table -->
        <div id="tab-content-0">
            <div class="bg-white rounded-3xl shadow-lg overflow-hidden">
                <div class="p-6 border-b">
                    <input type="text" id="searchInput" 
                           class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-400"
                           placeholder="🔍 Search by title, author, topics...">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-slate-50 border-b">
                                <th class="px-6 py-5 text-left">Cover</th>
                                <th class="px-6 py-5 text-left">Title</th>
                                <th class="px-6 py-5 text-left">Author</th>
                                <th class="px-6 py-5 text-left">Shelf</th>
                                <th class="px-6 py-5 text-left">Status</th>
                                <th class="px-6 py-5 text-left">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="books-table" class="text-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Add / Edit Book Form -->
        <div id="tab-content-1" class="hidden bg-white rounded-3xl shadow-xl p-10 max-w-4xl mx-auto">
            <h2 id="form-title" class="text-3xl font-bold text-slate-800 mb-8">Add New Book</h2>
            
            <form id="book-form" enctype="multipart/form-data" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Title <span class="text-red-500">*</span></label>
                        <input name="title" required class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Author <span class="text-red-500">*</span></label>
                        <input name="author" required class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:border-indigo-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Shelf</label>
                        <input name="shelf" class="w-full px-5 py-4 border border-slate-300 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Subject</label>
                        <input name="subject" class="w-full px-5 py-4 border border-slate-300 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Type</label>
                        <select name="type" class="w-full px-5 py-4 border border-slate-300 rounded-2xl">
                            <option value="Text">Text Book</option>
                            <option value="Note">Note / Handwritten</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Book Cover</label>
                    <input type="file" name="cover" accept="image/*" class="block w-full text-slate-500 file:mr-4 file:py-3 file:px-8 file:rounded-2xl file:border-0 file:bg-indigo-600 file:text-white">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-3">Extra Fields</label>
                    <div id="extra-fields-container" class="space-y-4"></div>
                    <button type="button" onclick="addExtraField()" class="text-indigo-600 hover:text-indigo-700 flex items-center gap-2 mt-3">
                        <i class="fas fa-plus"></i> Add Extra Field
                    </button>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">OCR Content</label>
                    <textarea name="ocr_content" rows="4" class="w-full px-6 py-5 border border-slate-300 rounded-3xl"></textarea>
                </div>

                <button type="button" onclick="saveBook()" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-6 rounded-3xl text-xl font-semibold">
                        💾 Save Book
                </button>
            </form>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="details-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-auto">
            <div class="p-8" id="modal-body"></div>
        </div>
    </div>

    <script>
        let books = [];
        let currentEditingId = null;

        async function loadBooks() {
            const res = await fetch('/api/books');
            books = await res.json();
            renderTable(books);
        }

        function renderTable(data) {
            const tbody = document.getElementById('books-table');
            tbody.innerHTML = '';

            data.forEach(book => {
                const cover = book.Cover ? 
                    `<img src="/covers/${book.Cover}" class="book-cover-small">` : 
                    `<div class="w-[55px] h-[75px] bg-slate-100 rounded-xl flex items-center justify-center text-3xl">📖</div>`;

                const row = document.createElement('tr');
                row.className = "border-b hover:bg-slate-50";
                row.innerHTML = `
                    <td class="px-6 py-5">${cover}</td>
                    <td class="px-6 py-5 font-medium">${book.Title}</td>
                    <td class="px-6 py-5">${book.Author}</td>
                    <td class="px-6 py-5">${book.Shelf || '-'}</td>
                    <td class="px-6 py-5">
                        <button onclick="toggleShelf(${book.ID}); event.stopImmediatePropagation()" 
                                class="px-5 py-2 rounded-2xl text-sm font-medium ${book.Status === 'On Shelf' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${book.Status}
                        </button>
                    </td>
                    <td class="px-6 py-5 space-x-4">
                        <button onclick="viewDetails(${book.ID}); event.stopImmediatePropagation()" class="text-blue-600 hover:text-blue-800">👁️ View</button>
                        <button onclick="editBook(${book.ID}); event.stopImmediatePropagation()" class="text-amber-600 hover:text-amber-800">✏️ Edit</button>
                        <button onclick="deleteBook(${book.ID}); event.stopImmediatePropagation()" class="text-red-600 hover:text-red-800">🗑️</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function toggleShelf(id) {
            await fetch(`/api/books/${id}/toggle`, { method: 'PUT' });
            loadBooks();
        }

        function viewDetails(id) {
            const book = books.find(b => parseInt(b.ID) === id);
            if (!book) return;

            let extra = Object.entries(book['Extra Fields'] || {})
                .map(([k,v]) => `<p><strong>${k}:</strong> ${v}</p>`).join('') || '<p class="text-slate-400">No extra fields</p>';

            document.getElementById('modal-body').innerHTML = `
                <button onclick="closeModal()" class="float-right text-4xl text-slate-300 hover:text-slate-500">×</button>
                ${book.Cover ? `<img src="/covers/${book.Cover}" class="w-full rounded-2xl mb-6">` : ''}
                <h2 class="text-3xl font-bold">${book.Title}</h2>
                <p class="text-xl text-slate-600">${book.Author}</p>
                <div class="grid grid-cols-2 gap-4 mt-6 text-sm">
                    <p><strong>Shelf:</strong> ${book.Shelf || '-'}</p>
                    <p><strong>Status:</strong> ${book.Status}</p>
                    <p><strong>Type:</strong> ${book.Type}</p>
                    <p><strong>Updated:</strong> ${book['Last Updated']}</p>
                </div>
                ${extra}
                ${book['OCR Content'] ? `<h3 class="mt-6 font-semibold">OCR Content</h3><pre class="bg-slate-50 p-5 rounded-2xl text-sm">${book['OCR Content']}</pre>` : ''}
            `;
            document.getElementById('details-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        function addExtraField() {
            const container = document.getElementById('extra-fields-container');
            const div = document.createElement('div');
            div.className = "flex gap-4";
            div.innerHTML = `
                <input placeholder="Field Name" class="flex-1 px-5 py-4 border border-slate-300 rounded-2xl">
                <input placeholder="Value" class="flex-1 px-5 py-4 border border-slate-300 rounded-2xl">
                <button onclick="this.parentElement.remove()" class="text-red-500">×</button>
            `;
            container.appendChild(div);
        }

        async function saveBook() {
            const formData = new FormData(document.getElementById('book-form'));
            const extraFields = {};
            document.querySelectorAll('#extra-fields-container > div').forEach(div => {
                const inputs = div.querySelectorAll('input');
                if (inputs[0] && inputs[0].value.trim()) {
                    extraFields[inputs[0].value.trim()] = inputs[1].value.trim();
                }
            });
            formData.append('extra_fields', JSON.stringify(extraFields));

            const url = currentEditingId ? `/api/books/${currentEditingId}` : '/api/books';
            const method = currentEditingId ? 'PUT' : 'POST';

            const res = await fetch(url, { method: method, body: formData });
            if (res.ok) {
                alert(currentEditingId ? "✅ Book Updated Successfully!" : "✅ Book Added Successfully!");
                resetForm();
                await loadBooks();
                switchTab(0);
            }
        }

        function resetForm() {
            document.getElementById('book-form').reset();
            document.getElementById('extra-fields-container').innerHTML = '';
            currentEditingId = null;
            document.getElementById('form-title').textContent = 'Add New Book';
        }

        async function editBook(id) {
            const book = books.find(b => parseInt(b.ID) === id);
            if (!book) return;

            currentEditingId = id;
            document.getElementById('form-title').textContent = 'Edit Book';

            document.querySelector('[name="title"]').value = book.Title;
            document.querySelector('[name="author"]').value = book.Author;
            document.querySelector('[name="shelf"]').value = book.Shelf || '';
            document.querySelector('[name="subject"]').value = book.Subject || '';
            document.querySelector('[name="type"]').value = book.Type;
            document.querySelector('[name="ocr_content"]').value = book['OCR Content'] || '';

            // Extra Fields
            const container = document.getElementById('extra-fields-container');
            container.innerHTML = '';
            Object.entries(book['Extra Fields'] || {}).forEach(([k,v]) => {
                const div = document.createElement('div');
                div.className = "flex gap-4";
                div.innerHTML = `
                    <input value="${k}" class="flex-1 px-5 py-4 border border-slate-300 rounded-2xl">
                    <input value="${v}" class="flex-1 px-5 py-4 border border-slate-300 rounded-2xl">
                    <button onclick="this.parentElement.remove()" class="text-red-500">×</button>
                `;
                container.appendChild(div);
            });

            switchTab(1);
        }

        async function deleteBook(id) {
            if (confirm("Delete this book permanently?")) {
                await fetch(`/api/books/${id}`, { method: 'DELETE' });
                loadBooks();
            }
        }

        function switchTab(n) {
            document.getElementById('tab-content-0').classList.toggle('hidden', n !== 0);
            document.getElementById('tab-content-1').classList.toggle('hidden', n !== 1);
            document.getElementById('tab0').classList.toggle('active', n === 0);
            document.getElementById('tab1').classList.toggle('active', n === 1);
        }

        // Search
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = books.filter(book => 
                book.Title.toLowerCase().includes(term) || 
                book.Author.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });

        window.onload = loadBooks;
    </script>
</body>
</html>
