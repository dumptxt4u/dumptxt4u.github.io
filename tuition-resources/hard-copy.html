<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relations and Functions | IIT | CBSE | PYQs & Worksheets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }
    .title-font {
      font-family: 'Space Grotesk', sans-serif;
    }

    .resource-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .resource-card:hover {
      transform: translateY(-15px) scale(1.04);
      box-shadow: 0 30px 60px -15px rgb(59 130 246 / 0.3);
    }

    .fade-in {
      animation: fadeInUp 0.8s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .si-badge {
      background: linear-gradient(135deg, #2563eb, #1e3a8a);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-indigo-950 to-blue-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-6 py-16">
    <!-- Header -->
    <div class="text-center mb-16">
      <div class="inline-flex items-center gap-4 bg-white/10 backdrop-blur-md px-8 py-3 rounded-3xl mb-6">
        <span class="text-3xl">📐</span>
        <span class="font-semibold text-2xl tracking-wide">Relations and Functions</span>
      </div>
      <h1 class="title-font text-6xl font-bold mb-4 tracking-tighter">
        Comprehensive Resource Hub
      </h1>
      <p class="text-2xl text-blue-200">IIT JEE • CBSE • PYQs • Worksheets • Case Studies • Assignments</p>
    </div>

    <!-- Search Bar -->
    <div class="max-w-2xl mx-auto mb-12">
      <div class="relative">
        <input 
          id="searchInput"
          type="text" 
          placeholder="Search by topic (PYQ, Case Study, Worksheet...)" 
          class="w-full bg-white/10 border border-white/20 rounded-3xl py-5 px-8 pl-16 text-lg focus:outline-none focus:border-blue-400 transition-all placeholder:text-white/60">
        <i class="fa-solid fa-magnifying-glass absolute left-7 top-1/2 -translate-y-1/2 text-blue-400 text-2xl"></i>
      </div>
    </div>

    <!-- Resources Grid -->
    <div id="resourcesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Populated by JavaScript -->
    </div>

    <div class="text-center mt-16 text-white/50 text-sm flex items-center justify-center gap-2">
      <span>Total Resources:</span>
      <span id="count" class="font-mono bg-white/10 px-4 py-1 rounded-2xl text-blue-300 font-medium">0</span>
    </div>
  </div>

  <script>
    // Updated JSON Data with your titles
    const resourcesData = [
      {
        "id": 1,
        "topic": "Relations and Functions IIT Questions PYQ Self",
        "url": "#"
      },
      {
        "id": 2,
        "topic": "59 Questions Dart School - Relations and Functions",
        "url": "#"
      },
      {
        "id": 3,
        "topic": "59 Questions Equivalence Relations",
        "url": "#"
      },
      {
        "id": 4,
        "topic": "Dr Amit Bajaj - Relations and Functions",
        "url": "#"
      },
      {
        "id": 5,
        "topic": "Worksheet 64 Questions on Relations and Functions",
        "url": "#"
      },
      {
        "id": 6,
        "topic": "PYQ CBSE Questions [Types of Relations & Types of Functions] 2024 to 2021",
        "url": "#"
      },
      {
        "id": 7,
        "topic": "Concepts of Relations and Functions - Total 43 Questions",
        "url": "#"
      },
      {
        "id": 8,
        "topic": "Case Study Relations and Functions - 5 Case Studies",
        "url": "#"
      },
      {
        "id": 9,
        "topic": "Case Study Questions - 10 Questions with Answers",
        "url": "#"
      },
      {
        "id": 10,
        "topic": "Assignment HOTS Questions - Relations and Functions",
        "url": "#"
      },
      {
        "id": 11,
        "topic": "Functions and Models",
        "url": "#"
      },
      {
        "id": 12,
        "topic": "Assertion and Reason Questions - Relations and Functions with Answers [ZIET]",
        "url": "#"
      },
      {
        "id": 13,
        "topic": "Daily Practice Questions - Relations and Functions",
        "url": "#"
      }
    ];

    function renderResources(data) {
      const container = document.getElementById('resourcesGrid');
      container.innerHTML = '';

      data.forEach((resource, index) => {
        const siCode = `+2-ch-1-${String(resource.id).padStart(2, '0')}`;

        const card = `
          <div class="resource-card bg-white/10 backdrop-blur-2xl border border-white/10 rounded-3xl overflow-hidden group fade-in" style="animation-delay: ${index * 80}ms">
            <div class="h-2.5 bg-gradient-to-r from-blue-500 via-indigo-500 to-violet-500"></div>
            
            <div class="p-8">
              <div class="si-badge text-white text-xs font-mono px-5 py-2 rounded-2xl inline-flex items-center gap-2 mb-6">
                <i class="fa-solid fa-hashtag"></i>
                <span>${siCode}</span>
              </div>

              <h3 class="text-2xl font-semibold leading-tight mb-10 line-clamp-3 min-h-[120px] group-hover:text-blue-200 transition-colors">
                ${resource.topic}
              </h3>

              <a href="${resource.url}" target="_blank" 
                 class="flex items-center justify-center gap-3 bg-white hover:bg-blue-600 text-slate-900 hover:text-white font-semibold py-4 px-10 rounded-2xl transition-all duration-300 group-hover:scale-105 active:scale-95">
                <span>Open Resource</span>
                <i class="fa-solid fa-arrow-up-right-from-square transition-transform group-hover:rotate-45"></i>
              </a>
            </div>
          </div>
        `;

        container.innerHTML += card;
      });

      document.getElementById('count').textContent = data.length;
    }

    // Live Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      
      const filtered = resourcesData.filter(item => 
        item.topic.toLowerCase().includes(term)
      );

      renderResources(filtered);
    });

    // Initialize
    window.onload = () => {
      renderResources(resourcesData);
    };
  </script>
</body>
</html>
