<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Vault • Explorer</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/themes/default/style.min.css">

    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .sidebar { background: #1e2937; height: 100vh; overflow: hidden; }
        #tree { height: calc(100vh - 180px); overflow: auto; }
        .content-area { background: #0f172a; }
        .item-card {
            transition: all 0.2s;
        }
        .item-card:hover {
            background: #1e2937;
            transform: translateY(-2px);
        }
        .folder-item { color: #facc15; }
        .file-item { color: #67e8f9; }
    </style>
</head>
<body>

<div class="container-fluid h-100">
    <div class="row h-100">

        <!-- Left Sidebar - Tree -->
        <div class="col-lg-4 col-xl-3 sidebar p-3">
            <div class="d-flex align-items-center mb-3">
                <i class="fas fa-infinity fa-2x text-warning me-3"></i>
                <h3 class="text-warning mb-0">Math Vault</h3>
            </div>

            <div class="input-group mb-3">
                <input type="text" id="search-input" class="form-control" placeholder="🔍 Search...">
            </div>

            <div id="tree"></div>
        </div>

        <!-- Right Panel - Folder Content -->
        <div class="col-lg-8 col-xl-9 content-area p-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb bg-dark" id="breadcrumb">
                    <li class="breadcrumb-item active">~/ Home</li>
                </ol>
            </nav>

            <h2 id="current-folder" class="text-warning mb-4">Root Folder</h2>
            
            <div class="row" id="folder-content">
                <!-- Files and Folders will be displayed here dynamically -->
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/jstree.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Global data
let treeData = [];
let childrenMap = {};

// Load external JSON
fetch('tree_data.json')
    .then(res => res.json())
    .then(data => {
        treeData = data;
        buildChildrenMap();
        initTree();
        showFolderContent("root"); // Show root by default
    })
    .catch(err => {
        console.error(err);
        alert("tree_data.json not found! Run generate_tree.py first.");
    });

// Build map for quick access to children
function buildChildrenMap() {
    childrenMap = {};
    treeData.forEach(item => {
        if (!childrenMap[item.parent]) childrenMap[item.parent] = [];
        childrenMap[item.parent].push(item);
    });
}

function initTree() {
    $('#tree').jstree({
        'core': {
            'data': treeData,
            'themes': { 'responsive': true }
        },
        'plugins': ['search']
    });

    // Search
    let timeout;
    $('#search-input').on('keyup', function() {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            $('#tree').jstree('search', $(this).val());
        }, 250);
    });

    // When node is selected in tree
    $('#tree').on('select_node.jstree', function(e, data) {
        const nodeId = data.node.id;
        const nodeText = data.node.text;
        
        $('#current-folder').text(nodeText);
        $('#breadcrumb').html(`<li class="breadcrumb-item active">${nodeId}</li>`);
        
        showFolderContent(nodeId);
    });
}

// Display files and folders in main area
function showFolderContent(parentId) {
    const container = $('#folder-content');
    container.empty();

    const items = childrenMap[parentId] || [];

    if (items.length === 0) {
        container.html(`<div class="col-12 text-center py-5 text-muted">This folder is empty.</div>`);
        return;
    }

    items.forEach(item => {
        const isFolder = !item.type || item.type !== "file";
        
        const card = `
            <div class="col-md-4 col-lg-3 mb-3">
                <div class="card item-card h-100 border-0 ${isFolder ? 'folder-item' : 'file-item'}" 
                     onclick="${isFolder ? `showFolderContent('${item.id}')` : `openFile('${item.id}')`}" 
                     style="cursor: pointer;">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas ${isFolder ? 'fa-folder fa-2x' : 'fa-file fa-2x'} me-3"></i>
                        <div class="flex-grow-1 overflow-hidden">
                            <h6 class="mb-0 text-truncate">${item.text}</h6>
                        </div>
                    </div>
                </div>
            </div>`;
        container.append(card);
    });
}

function openFile(filePath) {
    window.open(filePath, '_blank');
}
</script>

</body>
</html>
