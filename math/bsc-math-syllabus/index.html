<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Viewer (1-78)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }
    .container {
      max-width: 1000px;
      margin: 20px auto;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }
    .header {
      background: #333;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-button {
      padding: 10px 20px;
      background: #555;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    .nav-button:hover {
      background: #777;
    }
    .nav-button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 18px;
      font-weight: bold;
    }
    iframe {
      width: 100%;
      height: 80vh;
      border: none;
    }
    .footer {
      text-align: center;
      padding: 10px;
      background: #f9f9f9;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <button class="nav-button" id="prevBtn">← Previous</button>
      
      <div class="page-info">
        Page <span id="currentPage">1</span> of 78
      </div>
      
      <button class="nav-button" id="nextBtn">Next →</button>
    </div>
    
    <iframe id="pageFrame" src="1.html" title="Content Page"></iframe>
    
    <div class="footer">
      Use arrow keys ← → or buttons to navigate
    </div>
  </div>

  <script>
    let currentPage = 1;
    const totalPages = 78;
    const iframe = document.getElementById('pageFrame');
    const currentPageSpan = document.getElementById('currentPage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function loadPage(page) {
      if (page < 1 || page > totalPages) return;
      
      currentPage = page;
      iframe.src = `${page}.html`;
      currentPageSpan.textContent = currentPage;
      
      // Enable/disable buttons
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    // Button clicks
    prevBtn.addEventListener('click', () => {
      loadPage(currentPage - 1);
    });

    nextBtn.addEventListener('click', () => {
      loadPage(currentPage + 1);
    });

    // Keyboard navigation (Left/Right arrows)
    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowLeft") {
        loadPage(currentPage - 1);
      } else if (e.key === "ArrowRight") {
        loadPage(currentPage + 1);
      }
    });

    // Optional: Jump to page by typing number (press Enter)
    document.addEventListener('keypress', (e) => {
      if (e.key === "Enter") {
        const input = prompt(`Go to page (1-${totalPages}):`);
        if (input) {
          const pageNum = parseInt(input);
          if (!isNaN(pageNum) && pageNum >= 1 && pageNum <= totalPages) {
            loadPage(pageNum);
          }
        }
      }
    });

    // Initial load
    loadPage(1);
  </script>

</body>
</html>
