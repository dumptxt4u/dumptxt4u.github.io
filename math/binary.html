    // Render cards
    function renderVideos(filteredVideos) {
      const grid = document.getElementById('video-grid');
      grid.innerHTML = '';

      filteredVideos.forEach(video => {
        const cardHTML = `
          <a href="${video.url}" target="_blank" class="video-card group block bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 hover:border-blue-500">
            <div class="thumbnail-container">
              <img src="${video.thumbnail}" 
                   alt="${video.title}"
                   class="w-full aspect-video object-cover">
              <div class="play-overlay">
                <i class="fas fa-play text-2xl text-zinc-900 ml-1"></i>
              </div>
            </div>
            <div class="p-5">
              <h3 class="font-medium line-clamp-2 leading-tight text-lg group-hover:text-blue-400 transition-colors">
                ${video.title}
              </h3>
              <div class="flex items-center gap-2 mt-4 text-xs text-zinc-500">
                <i class="fas fa-youtube"></i>
                <span>YouTube</span>
                <span class="mx-1">•</span>
                <span>${new Date(video.fetched_at).toLocaleDateString('en-US', {month:'short', day:'numeric'})}</span>
              </div>
            </div>
          </a>
        `;
        grid.innerHTML += cardHTML;
      });
    }

    // Search functionality
    function filterVideos(searchTerm) {
      const term = searchTerm.toLowerCase();
      const filtered = data.videos.filter(video => 
        video.title.toLowerCase().includes(term)
      );
      renderVideos(filtered);
    }

    // Initialize
    function init() {
      document.getElementById('total-count').textContent = data.total_videos;
      renderVideos(data.videos);

      // Live search
      const searchInput = document.getElementById('search-input');
      searchInput.addEventListener('input', (e) => {
        filterVideos(e.target.value);
      });
    }

    window.onload = init;
