<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }

    .video-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .video-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .thumbnail-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
    }

    .thumbnail {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(255, 0, 0, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .video-card:hover .play-button {
      background: rgba(255, 0, 0, 1);
      transform: translate(-50%, -50%) scale(1.1);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 18px solid white;
      margin-left: 4px;
    }

    .video-info {
      padding: 16px;
    }

    .video-title {
      font-size: 1.05rem;
      line-height: 1.4;
      color: #222;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .watch-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #ff0000;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: background 0.3s;
    }

    .watch-btn:hover {
      background: #cc0000;
    }

    @media (max-width: 480px) {
      .video-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube Video Collection</h1>
    
    <div class="video-grid" id="videoGrid">
      <!-- Cards will be inserted here by JavaScript -->
    </div>
  </div>

  <script>
    // Array of your YouTube video links
    const videoLinks = [
      "https://www.youtube.com/watch?v=H-QdK1l74Tw",
      "https://www.youtube.com/watch?v=b7m0FeJtgJc",
      "https://www.youtube.com/watch?v=BbFRl56SW08",
      "https://www.youtube.com/watch?v=58-Z7W7LN-4",
      "https://www.youtube.com/watch?v=HuhvvSmFxDA",
      "https://www.youtube.com/watch?v=wXvgheEKpU4",
      "https://www.youtube.com/watch?v=aYoW9iHDOW0",
      "https://www.youtube.com/watch?v=RuQ9NBL6zag",
      "https://www.youtube.com/watch?v=ooLKs-z7Ark",
      "https://www.youtube.com/watch?v=TUSrEVEXEAw",
      "https://www.youtube.com/watch?v=VHpsEtiIfu4",
      "https://www.youtube.com/watch?v=uixV81fy8Qw",
      "https://www.youtube.com/watch?v=Uy02Hfcn_w8",
      "https://www.youtube.com/watch?v=73odB03vl5o",
      "https://www.youtube.com/watch?v=WQ4sK5Tds0U",
      "https://www.youtube.com/watch?v=JxpD9xlTzps",
      "https://www.youtube.com/watch?v=d0LwEuvqpyE",
      "https://www.youtube.com/watch?v=p033I-UjnmU",
      "https://www.youtube.com/watch?v=WS59MGAnCq4",
      "https://www.youtube.com/watch?v=6VBaptYf194",
      "https://www.youtube.com/watch?v=6VBaptYf194",
      "https://www.youtube.com/watch?v=KvH6QBNbVJs",
      "https://www.youtube.com/watch?v=p_sV4AWqTJ8",
      "https://www.youtube.com/watch?v=fww_5f7mTkg"
    ];

    // Function to extract video ID from YouTube URL
    function getVideoId(url) {
      const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    // Function to fetch video title using YouTube oEmbed (no API key needed)
    async function getVideoTitle(videoId) {
      try {
        const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
        const data = await response.json();
        return data.title || "YouTube Video";
      } catch (error) {
        return "YouTube Video"; // Fallback title
      }
    }

    // Create video card
    async function createVideoCard(url) {
      const videoId = getVideoId(url);
      if (!videoId) return null;

      const title = await getVideoTitle(videoId);
      const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

      const card = document.createElement('div');
      card.className = 'video-card';

      card.innerHTML = `
        <div class="thumbnail-container">
          <img src="${thumbnailUrl}" alt="${title}" class="thumbnail">
          <div class="play-button">
            <div class="play-icon"></div>
          </div>
        </div>
        <div class="video-info">
          <h3 class="video-title">${title}</h3>
          <a href="${url}" target="_blank" class="watch-btn">Watch on YouTube</a>
        </div>
      `;

      return card;
    }

    // Load all videos
    async function loadVideos() {
      const grid = document.getElementById('videoGrid');
      grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px;">Loading videos...</p>';

      for (const url of videoLinks) {
        const card = await createVideoCard(url);
        if (card) {
          grid.appendChild(card);
        }
      }
    }

    // Initialize when page loads
    window.onload = loadVideos;
  </script>
</body>
</html>
